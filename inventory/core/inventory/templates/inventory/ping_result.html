<h2>Ping Result</h2>

{% if ip %}
    <p><strong>IP:</strong> {{ ip }}</p>

    {% if reachable %}
        <p style="color: green; font-weight: bold;">✔ Reachable</p>
    {% else %}
        <p style="color: red; font-weight: bold;">✘ Not reachable</p>
    {% endif %}

    <pre>{{ output }}</pre>

{% else %}
    <p>No IP provided.</p>
{% endif %}

<a href="javascript:history.back()">Back</a>
